<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAC - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-brand">
            <div class="icon">🏘️</div>
            <h1>JAC</h1>
            <p>Sistema de gestión integral para Juntas de Acción Comunal</p>
            <div class="version">v2.0</div>
        </div>
        <div class="login-form-wrap">
            <h2>Iniciar Sesión</h2>
            <p class="sub">Ingresa tus credenciales para acceder al sistema</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn-primary">Ingresar</button>
                <div class="msg" id="msg"></div>
            </form>
            </div>
        </div>
    </div>
    <script src="js/supabase.js"></script>
    <script src="js/db.js"></script>
    <script>
        localStorage.removeItem('jac_session');

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const msgEl = document.getElementById('msg');
            msgEl.className = 'msg';
            msgEl.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                msgEl.textContent = 'Todos los campos son obligatorios';
                msgEl.className = 'msg error';
                msgEl.style.display = 'block';
                return;
            }

            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Ingresando...';

            const result = await loginUser(username, password);

            if (result.ok) {
                localStorage.setItem('jac_session', JSON.stringify(result.user));
                window.location.href = 'dashboard.html';
            } else {
                msgEl.textContent = result.error;
                msgEl.className = 'msg error';
                msgEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Ingresar';
            }
        });
    </script>
</body>
</html>

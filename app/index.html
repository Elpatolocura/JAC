<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAC - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-brand">
            <div class="icon">🏘️</div>
            <h1>JAC</h1>
            <p>Sistema de gestión integral para Juntas de Acción Comunal</p>
            <div class="version">v2.0</div>
        </div>
        <div class="login-form-wrap">
            <h2>Iniciar Sesión</h2>
            <p class="sub">Ingresa tus credenciales para acceder al sistema</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn-primary">Ingresar</button>
                <div class="msg" id="msg"></div>
            </form>
            <div style="text-align:center;margin-top:18px;border-top:1px solid var(--border);padding-top:16px;">
                <button id="btnRegistro" style="width:100%;padding:12px;border:2px dashed var(--blue);border-radius:10px;background:linear-gradient(135deg,rgba(0,56,147,0.04),rgba(255,204,0,0.06));color:var(--blue);font-weight:600;font-size:0.95rem;cursor:pointer;transition:all 0.3s;font-family:inherit;" onmouseenter="this.style.background='linear-gradient(135deg,rgba(0,56,147,0.1),rgba(255,204,0,0.15))';this.style.borderStyle='solid';this.style.transform='translateY(-2px)';this.style.boxShadow='0 4px 12px rgba(0,56,147,0.15)'" onmouseleave="this.style.background='linear-gradient(135deg,rgba(0,56,147,0.04),rgba(255,204,0,0.06))';this.style.borderStyle='dashed';this.style.transform='none';this.style.boxShadow='none'">✨ Registrarse</button>
                <a href="reunion.html" style="display:block;margin-top:12px;font-size:0.85rem;color:var(--blue);text-decoration:none;">📹 ¿Invitado a una reunión? Ingresá acá</a>
            </div>
            </div>
        </div>
    </div>

    <!-- Modal Registro -->
    <div id="modalRegistro" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:999;align-items:center;justify-content:center;">
      <div style="background:white;border-radius:16px;padding:32px;width:90%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.15);animation:fadeUp 0.3s ease;max-height:90vh;overflow-y:auto;">
        <div style="font-size:2rem;text-align:center;margin-bottom:4px;">📝</div>
        <h3 style="text-align:center;margin-bottom:16px;">Registrar Usuario</h3>
        <form id="formRegistro">
          <div class="form-group">
            <label for="regUsername">Usuario</label>
            <input type="text" id="regUsername" placeholder="Nombre de usuario" required>
          </div>
          <div class="form-group">
            <label for="regPassword">Contraseña</label>
            <input type="password" id="regPassword" placeholder="Contraseña" required minlength="4">
          </div>
          <div class="form-group">
            <label for="regCedula">N° Cédula</label>
            <input type="text" id="regCedula" placeholder="Cédula del usuario">
          </div>
          <div class="form-group">
            <label for="regCodigo">Código de registro</label>
            <input type="text" id="regCodigo" placeholder="Código proporcionado por el administrador" required>
          </div>
          <div class="form-group">
            <label for="regName">Nombre completo</label>
            <input type="text" id="regName" placeholder="Nombre y apellidos" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="regRole">Rol</label>
              <select id="regRole" required>
                <option value="">Seleccione</option>
                <option value="Presidente">Presidente</option>
                <option value="Secretario">Secretario</option>
                <option value="Tesorero">Tesorero</option>
              </select>
            </div>
            <div class="form-group">
              <label for="regCiudad">Ciudad</label>
              <input type="text" id="regCiudad" placeholder="Ej: Cartagena" required>
            </div>
          </div>
          <div class="form-group">
            <label for="regBarrio">Barrio</label>
            <input type="text" id="regBarrio" placeholder="Ej: El Progreso, Torices..." required>
          </div>
          <button type="submit" class="btn-primary">Crear usuario</button>
          <div class="msg" id="regMsg"></div>
        </form>
      </div>
    </div>
    <script src="js/supabase.js"></script>
    <script src="js/db.js"></script>
    <script>
        localStorage.removeItem('jac_session');

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const msgEl = document.getElementById('msg');
            msgEl.className = 'msg';
            msgEl.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                msgEl.textContent = 'Todos los campos son obligatorios';
                msgEl.className = 'msg error';
                msgEl.style.display = 'block';
                return;
            }

            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Ingresando...';

            const result = await loginUser(username, password);

            if (result.ok) {
                const session = { ...result.user, mustChangePassword: result.mustChangePassword };
                localStorage.setItem('jac_session', JSON.stringify(session));
                window.location.href = 'dashboard.html';
            } else {
                msgEl.textContent = result.error;
                msgEl.className = 'msg error';
                msgEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Ingresar';
            }
        });

        // ===== REGISTRO =====
        document.getElementById('btnRegistro').addEventListener('click', function () {
            document.getElementById('modalRegistro').style.display = 'flex';
        });

        document.getElementById('modalRegistro').addEventListener('click', function (e) {
            if (e.target === this) this.style.display = 'none';
        });

        document.getElementById('formRegistro').addEventListener('submit', async function (e) {
            e.preventDefault();
            const msg = document.getElementById('regMsg');
            msg.className = 'msg';
            msg.style.display = 'none';

            const campos = {
                username: document.getElementById('regUsername').value.trim(),
                password: document.getElementById('regPassword').value.trim(),
                cedula: document.getElementById('regCedula').value.trim(),
                codigo: document.getElementById('regCodigo').value.trim(),
                name: document.getElementById('regName').value.trim(),
                role: document.getElementById('regRole').value,
                ciudad: document.getElementById('regCiudad').value.trim(),
                barrio: document.getElementById('regBarrio').value,
            };

            if (!campos.username || !campos.password || !campos.codigo || !campos.name || !campos.role || !campos.ciudad || !campos.barrio) {
                msg.textContent = 'Todos los campos obligatorios deben estar diligenciados';
                msg.className = 'msg error';
                msg.style.display = 'block';
                return;
            }
            if (campos.password.length < 4) {
                msg.textContent = 'La contraseña debe tener al menos 4 caracteres';
                msg.className = 'msg error';
                msg.style.display = 'block';
                return;
            }

            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Creando...';

            const result = await registerUser(campos);

            if (result.ok) {
                msg.textContent = '✅ Usuario creado exitosamente. Ya puede iniciar sesión.';
                msg.className = 'msg success';
                msg.style.display = 'block';
                this.reset();
                setTimeout(function () {
                    document.getElementById('modalRegistro').style.display = 'none';
                    msg.style.display = 'none';
                }, 2000);
            } else {
                msg.textContent = result.error;
                msg.className = 'msg error';
                msg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Crear usuario';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAC - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-brand">
            <div class="icon">🏘️</div>
            <h1>JAC</h1>
            <p>Sistema de gestión integral para Juntas de Acción Comunal</p>
            <div class="version">v2.0</div>
        </div>
        <div class="login-form-wrap">
            <h2>Iniciar Sesión</h2>
            <p class="sub">Ingresa tus credenciales para acceder al sistema</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn-primary">Ingresar</button>
                <div class="msg" id="msg"></div>
            </form>
            </div>
        </div>
    </div>
    <script>
        localStorage.removeItem('jac_session');

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const msgEl = document.getElementById('msg');
            msgEl.className = 'msg';
            msgEl.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                msgEl.textContent = 'Todos los campos son obligatorios';
                msgEl.className = 'msg error';
                msgEl.style.display = 'block';
                return;
            }

            const users = [
                { username: 'presidente_progreso', password: '123456', name: 'Carlos Martínez', role: 'Presidente', barrio: 'El Progreso' },
                { username: 'secretario_progreso', password: '123456', name: 'María Gómez', role: 'Secretario', barrio: 'El Progreso' },
                { username: 'presidente_villa', password: '123456', name: 'Luis Hernández', role: 'Presidente', barrio: 'Villa Nueva' },
                { username: 'secretario_villa', password: '123456', name: 'Sofía Ramírez', role: 'Secretario', barrio: 'Villa Nueva' },
                { username: 'presidente_olivos', password: '123456', name: 'Andrés Castillo', role: 'Presidente', barrio: 'Los Olivos' },
                { username: 'secretario_olivos', password: '123456', name: 'Carolina Pérez', role: 'Secretario', barrio: 'Los Olivos' },
                { username: 'presidente_florida', password: '123456', name: 'Jorge Medina', role: 'Presidente', barrio: 'La Florida' },
                { username: 'secretario_florida', password: '123456', name: 'Ana Rodríguez', role: 'Secretario', barrio: 'La Florida' },
                { username: 'ranceth', password: '123456', name: 'Ranceth', role: 'Presidente', barrio: 'Torices' },
            ];

            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                localStorage.setItem('jac_session', JSON.stringify({
                    username: user.username,
                    name: user.name,
                    role: user.role,
                    barrio: user.barrio,
                }));
                window.location.href = 'dashboard.html';
            } else {
                msgEl.textContent = 'Usuario o contraseña incorrectos';
                msgEl.className = 'msg error';
                msgEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
